<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빅데이터분석기사 필기 CBT</title>
<style>
  /* ══ THEME VARIABLES ══
     모든 색상은 각 테마 블록 안에 정의 → 모드 전환 시 전부 자동 교체됨
  ══════════════════════════════════════ */

  [data-theme="dark"] {
    /* 배경/표면 */
    --bg:      #0a0a14;
    --surface: #111128;
    --card:    #161630;
    --border:  #2a2a4a;
    --shadow:  rgba(0,245,255,.06);

    /* 텍스트 — 어두운 배경에서 밝은 색 */
    --text:    #f0f4ff;
    --sub:     #b0bacf;

    /* 버튼 보조 */
    --btn-secondary:      #1e1e40;
    --btn-secondary-text: #f0f4ff;

    /* 네온 강조색 (밝은 원색 — 어두운 배경에서 잘 보임) */
    --accent:  #00f5ff;
    --accent2: #bf00ff;

    /* 텍스트용 강조색 (배경 위에 읽기 편한 색) */
    --accent-text:  #00f5ff;
    --accent2-text: #d480ff;
    --badge-text:   #00e5ff;
    --timer-color:  #00f5ff;

    /* 정답/오답 */
    --correct-bg:     rgba(0,255,136,.14);
    --correct-border: rgba(0,255,136,.75);
    --correct-text:   #00e676;
    --wrong-bg:       rgba(255,45,85,.14);
    --wrong-border:   rgba(255,45,85,.75);
    --wrong-text:     #ff5370;
  }

  [data-theme="light"] {
    /* 배경/표면 */
    --bg:      #f0f4ff;
    --surface: #e4e9f8;
    --card:    #ffffff;
    --border:  #bcc5e4;
    --shadow:  rgba(80,60,200,.07);

    /* 텍스트 — 밝은 배경에서 진한 색 */
    --text:    #0d0d2b;
    --sub:     #3a4268;

    /* 버튼 보조 */
    --btn-secondary:      #dde2f5;
    --btn-secondary-text: #0d0d2b;

    /* 네온 강조색 (글로우·테두리용 — 밝아도 장식 OK) */
    --accent:  #00b8d4;
    --accent2: #9c27b0;

    /* 텍스트용 강조색 (밝은 배경 위에서 잘 보이도록 진하게) */
    --accent-text:  #005f7a;
    --accent2-text: #6a0080;
    --badge-text:   #005f7a;
    --timer-color:  #005f7a;

    /* 정답/오답 */
    --correct-bg:     rgba(0,160,80,.10);
    --correct-border: rgba(0,140,70,.55);
    --correct-text:   #006830;
    --wrong-bg:       rgba(200,0,40,.09);
    --wrong-border:   rgba(185,0,35,.50);
    --wrong-text:     #b0001a;
  }

  /* ══ BASE ══ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s, border-color .3s;
  }

  /* ══ SCREEN ══ */
  .screen { display: none !important; }
  .screen.active { display: block !important; }
  #home.active   { display: flex !important; }
  #result.active { display: flex !important; }

  /* ══ THEME TOGGLE ══ */
  #themeToggle {
    position: fixed; top: 1rem; right: 1rem; z-index: 999;
    width: 46px; height: 26px;
    background: none; border: none; cursor: pointer; padding: 0;
  }
  .toggle-track {
    width: 46px; height: 26px;
    border-radius: 13px;
    background: var(--border);
    border: 1.5px solid var(--accent);
    box-shadow: 0 0 8px var(--accent), inset 0 0 4px rgba(0,245,255,.15);
    position: relative;
    transition: all .3s;
  }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    transition: transform .3s;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  [data-theme="light"] .toggle-thumb { transform: translateX(20px); background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
  [data-theme="light"] .toggle-track  { border-color: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

  /* ══ NEON GLOW HELPER ══ */
  .neon-box {
    box-shadow:
      0 0 0 1px var(--border),
      0 0 12px var(--shadow),
      0 4px 30px var(--shadow);
  }

  /* ══ HOME ══ */
  #home {
    min-height: 100vh; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
  }
  .home-card {
    background: var(--card);
    border-radius: 22px;
    padding: 3rem 2.5rem;
    max-width: 560px; width: 100%;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px var(--shadow), 0 0 1px var(--accent);
    text-align: center;
  }
  .home-card h1 {
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(90deg, var(--accent-text), var(--accent2-text));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: .4rem;
    filter: drop-shadow(0 0 6px var(--accent));
  }
  .home-card > p { color: var(--sub); margin-bottom: 2rem; font-size: .95rem; }

  .badge-row { display: flex; justify-content: center; gap: .6rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .badge {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--badge-text);
    padding: .3rem .85rem; border-radius: 999px; font-size: .8rem; font-weight: 600;
    box-shadow: 0 0 6px rgba(0,245,255,.2);
  }

  .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin-bottom: 2rem; }
  .subject-btn {
    padding: .9rem; border-radius: 12px; cursor: pointer;
    font-size: .9rem; font-weight: 600;
    background: var(--btn-secondary);
    color: var(--btn-secondary-text);
    border: 2px solid var(--border);
    transition: all .2s;
  }
  .subject-btn:hover { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,245,255,.25); }
  .subject-btn.sel {
    border-color: var(--accent);
    background: rgba(0,245,255,.1);
    color: var(--accent-text);
    box-shadow: 0 0 14px rgba(0,245,255,.3);
  }
  .subject-btn.sel-all {
    border-color: var(--accent2);
    background: rgba(191,0,255,.12);
    color: var(--accent2-text);
    box-shadow: 0 0 14px rgba(191,0,255,.35);
  }

  .shuffle-row {
    display: flex; align-items: center; justify-content: center;
    gap: .5rem; margin-bottom: 1.5rem;
    font-size: .9rem; color: var(--sub);
  }
  .shuffle-row input[type=checkbox] {
    width: 16px; height: 16px; cursor: pointer;
    accent-color: var(--accent);
  }

  .start-btn {
    width: 100%; padding: 1rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0a14;
    border: none; border-radius: 12px;
    font-size: 1.05rem; font-weight: 800;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,245,255,.4), 0 0 40px rgba(191,0,255,.2);
    transition: all .2s;
    letter-spacing: .03em;
  }
  .start-btn:hover {
    box-shadow: 0 0 30px rgba(0,245,255,.6), 0 0 60px rgba(191,0,255,.35);
    transform: translateY(-1px);
  }

  /* ══ QUIZ ══ */
  #quiz { min-height: 100vh; padding: 1rem; }
  .quiz-wrap { max-width: 700px; margin: 0 auto; }

  .top-bar {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 1rem;
  }
  .subj-label {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #0a0a14;
    padding: .3rem .9rem; border-radius: 999px;
    font-size: .82rem; font-weight: 800;
    box-shadow: 0 0 10px rgba(0,245,255,.35);
  }
  .q-counter { color: var(--sub); font-size: .9rem; font-weight: 600; }
  .timer {
    font-size: .9rem; font-weight: 800;
    color: var(--timer-color);
    text-shadow: 0 0 8px var(--accent);
  }

  .progress-bar {
    height: 6px; background: var(--border); border-radius: 3px;
    margin-bottom: 1.5rem; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px; transition: width .3s;
    box-shadow: 0 0 8px var(--accent);
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 2rem;
    box-shadow: 0 4px 30px var(--shadow);
    margin-bottom: 1rem;
  }
  .q-card .q-num { font-size: .82rem; color: var(--sub); margin-bottom: .6rem; font-weight: 600; }
  .q-card .q-text {
    font-size: 1.05rem; font-weight: 700;
    line-height: 1.7; color: var(--text);
  }

  .choices { display: flex; flex-direction: column; gap: .7rem; margin-top: 1.2rem; }
  .choice {
    display: flex; align-items: flex-start; gap: .8rem;
    padding: .9rem 1.1rem;
    border: 2px solid var(--border);
    border-radius: 12px; cursor: pointer;
    transition: all .2s;
    background: var(--surface);
    color: var(--text);
    font-size: .95rem; line-height: 1.5; text-align: left;
  }
  .choice:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(0,245,255,.07);
    box-shadow: 0 0 12px rgba(0,245,255,.2);
  }

  /* ── CORRECT (green neon) ── */
  .choice.correct {
    border-color: var(--correct-border) !important;
    background: var(--correct-bg) !important;
    color: var(--correct-text) !important;
    font-weight: 700;
    box-shadow: 0 0 16px rgba(0,255,136,.35), inset 0 0 8px rgba(0,255,136,.1) !important;
  }
  /* ── WRONG (red neon) ── */
  .choice.wrong {
    border-color: var(--wrong-border) !important;
    background: var(--wrong-bg) !important;
    color: var(--wrong-text) !important;
    font-weight: 700;
    box-shadow: 0 0 16px rgba(255,45,85,.35), inset 0 0 8px rgba(255,45,85,.1) !important;
  }
  /* 오답 시 정답 하이라이트 */
  .choice.show-correct {
    border-color: var(--correct-border) !important;
    background: var(--correct-bg) !important;
    box-shadow: 0 0 14px rgba(0,255,136,.3) !important;
  }
  .choice.disabled { cursor: default; }
  .choice-marker { font-weight: 700; min-width: 22px; }

  /* ── FEEDBACK ── */
  .feedback-box {
    border-radius: 14px; padding: 1rem 1.2rem;
    font-size: .92rem; line-height: 1.6; display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb {
    background: var(--correct-bg);
    border: 2px solid var(--correct-border);
    color: var(--correct-text);
    box-shadow: 0 0 20px rgba(0,255,136,.25);
    font-weight: 600;
  }
  .feedback-box.wrong-fb {
    background: var(--wrong-bg);
    border: 2px solid var(--wrong-border);
    color: var(--wrong-text);
    box-shadow: 0 0 20px rgba(255,45,85,.25);
    font-weight: 600;
  }
  .fb-title { font-weight: 900; margin-bottom: .3rem; font-size: 1.05rem; }

  .nav-row { display: flex; gap: .7rem; justify-content: flex-end; margin-top: 1rem; }
  .btn-next {
    padding: .7rem 1.8rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0a14;
    border: none; border-radius: 10px;
    font-size: .95rem; font-weight: 800;
    cursor: pointer; display: none;
    box-shadow: 0 0 16px rgba(0,245,255,.4);
    transition: all .2s;
  }
  .btn-next.show { display: block; }
  .btn-next:hover {
    box-shadow: 0 0 24px rgba(0,245,255,.6);
    transform: translateY(-1px);
  }

  /* ══ RESULT ══ */
  #result {
    min-height: 100vh; align-items: center;
    justify-content: center; padding: 2rem;
  }
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px; padding: 2.5rem 2rem;
    max-width: 620px; width: 100%;
    box-shadow: 0 0 40px var(--shadow), 0 0 1px var(--accent2);
  }
  .result-card h2 {
    text-align: center; font-size: 1.6rem; font-weight: 800;
    background: linear-gradient(90deg, var(--accent-text), var(--accent2-text));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: .5rem;
  }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 1.5rem auto;
    border: 4px solid transparent;
    background:
      linear-gradient(var(--card), var(--card)) padding-box,
      linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
    box-shadow: 0 0 30px rgba(0,245,255,.3), 0 0 60px rgba(191,0,255,.15);
  }
  .score-circle .score-num {
    font-size: 2.3rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent-text), var(--accent2-text));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .score-circle .score-label { font-size: .8rem; color: var(--sub); }

  .subj-result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin: 1.5rem 0; }
  .subj-result-item {
    border: 1.5px solid var(--border);
    border-radius: 14px; padding: 1rem; text-align: center;
    background: var(--surface);
  }
  .subj-result-item .subj-name { font-size: .82rem; color: var(--sub); margin-bottom: .4rem; }
  .subj-result-item .subj-score { font-size: 1.3rem; font-weight: 800; }
  .subj-result-item .pass { color: var(--correct-text); }
  .subj-result-item .fail { color: var(--wrong-text); }
  .result-msg {
    text-align: center; font-size: 1.05rem; font-weight: 700;
    margin-bottom: 1.5rem; padding: .85rem; border-radius: 12px;
  }
  .result-msg.pass {
    background: var(--correct-bg);
    border: 2px solid var(--correct-border);
    color: var(--correct-text);
    box-shadow: 0 0 20px rgba(0,255,136,.2);
  }
  .result-msg.fail {
    background: var(--wrong-bg);
    border: 2px solid var(--wrong-border);
    color: var(--wrong-text);
    box-shadow: 0 0 20px rgba(255,45,85,.2);
  }
  .btn-row { display: flex; gap: .8rem; flex-wrap: wrap; }
  .btn-row button {
    flex: 1; min-width: 140px; padding: .9rem;
    border-radius: 12px; border: none;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    transition: all .2s;
  }
  .btn-review {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0a14;
    box-shadow: 0 0 14px rgba(0,245,255,.4);
  }
  .btn-review:hover { box-shadow: 0 0 24px rgba(0,245,255,.6); transform: translateY(-1px); }
  .btn-home {
    background: var(--btn-secondary);
    color: var(--btn-secondary-text);
    border: 1.5px solid var(--border);
  }
  .btn-home:hover { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,245,255,.2); }

  /* ══ REVIEW ══ */
  #review { padding: 1.5rem; }
  .review-wrap { max-width: 700px; margin: 0 auto; }
  .review-wrap h2 {
    font-size: 1.3rem; font-weight: 800; margin-bottom: 1.5rem;
    background: linear-gradient(90deg, var(--accent-text), var(--accent2-text));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 1.4rem; margin-bottom: 1rem;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .review-item.r-correct {
    border-left: 4px solid var(--correct-border);
    box-shadow: -2px 0 12px rgba(0,255,136,.15), 0 2px 12px var(--shadow);
  }
  .review-item.r-wrong {
    border-left: 4px solid var(--wrong-border);
    box-shadow: -2px 0 12px rgba(255,45,85,.15), 0 2px 12px var(--shadow);
  }
  .review-q { font-weight: 600; font-size: .97rem; margin-bottom: .8rem; line-height: 1.6; }
  .review-choices { display: flex; flex-direction: column; gap: .4rem; font-size: .9rem; }
  .review-choice { padding: .5rem .8rem; border-radius: 8px; color: var(--text); }
  .review-choice.rc-correct {
    background: var(--correct-bg);
    color: var(--correct-text);
    font-weight: 700;
    border: 1px solid var(--correct-border);
  }
  .review-choice.rc-wrong-sel {
    background: var(--wrong-bg);
    color: var(--wrong-text);
    border: 1px solid var(--wrong-border);
  }
  .review-exp {
    margin-top: .8rem; padding: .75rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; font-size: .9rem; color: var(--text); line-height: 1.6;
  }
  .review-exp strong { color: var(--text); font-weight: 800; }
  .back-btn {
    display: inline-block; margin-bottom: 1.2rem;
    padding: .5rem 1.3rem;
    background: var(--btn-secondary);
    color: var(--btn-secondary-text);
    border: 1.5px solid var(--border);
    border-radius: 10px; cursor: pointer; font-size: .9rem;
    transition: all .2s;
  }
  .back-btn:hover { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,245,255,.2); }

  @media (max-width: 500px) {
    .subject-grid     { grid-template-columns: 1fr; }
    .subj-result-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- 다크/라이트 토글 -->
<button id="themeToggle" onclick="toggleTheme()" title="테마 전환">
  <div class="toggle-track">
    <div class="toggle-thumb" id="toggleIcon">🌙</div>
  </div>
</button>

<div id="home" class="screen active">
  <div class="home-card">
    <h1>📊 빅데이터분석기사</h1>
    <p>필기 모의고사 CBT</p>
    <div class="badge-row">
      <span class="badge">총 80문항</span>
      <span class="badge">과목당 20문항</span>
      <span class="badge">합격 평균 60점</span>
      <span class="badge">과목 40점 이상</span>
    </div>
    <p style="font-size:.88rem;color:var(--sub);margin-bottom:1rem;text-align:left">풀 과목 선택</p>
    <div class="subject-grid">
      <button class="subject-btn sel-all" id="btnAll" onclick="toggleAll()">전 과목</button>
      <button class="subject-btn" id="btn1" onclick="toggleSubj(1)">1과목: 분석 기획</button>
      <button class="subject-btn" id="btn2" onclick="toggleSubj(2)">2과목: 탐색</button>
      <button class="subject-btn" id="btn3" onclick="toggleSubj(3)">3과목: 모델링</button>
      <button class="subject-btn" id="btn4" onclick="toggleSubj(4)">4과목: 결과해석</button>
    </div>
    <div class="shuffle-row">
      <input type="checkbox" id="shuffleChk" checked>
      <label for="shuffleChk">문제 순서 섞기</label>
    </div>
    <button class="start-btn" onclick="startExam()">⚡ 시험 시작</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="quiz-wrap">
    <div class="top-bar">
      <span class="subj-label" id="subjLabel"></span>
      <span class="q-counter" id="qCounter"></span>
      <span class="timer" id="timer">120:00</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="q-card">
      <div class="q-num" id="qNum"></div>
      <div class="q-text" id="qText"></div>
      <div class="choices" id="choicesWrap"></div>
    </div>
    <div class="feedback-box" id="feedbackBox">
      <div class="fb-title" id="fbTitle"></div>
      <div id="fbBody"></div>
    </div>
    <div class="nav-row">
      <button class="btn-next" id="btnNext" onclick="nextQ()">다음 문제 →</button>
    </div>
  </div>
</div>

<div id="result" class="screen">
  <div class="result-card">
    <h2>시험 결과</h2>
    <div class="score-circle">
      <span class="score-num" id="totalScore">0</span>
      <span class="score-label">총 점수</span>
    </div>
    <div class="subj-result-grid" id="subjResultGrid"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="btn-row">
      <button class="btn-review" onclick="showReview()">오답 &amp; 해설 보기</button>
      <button class="btn-home" onclick="goHome()">다시 풀기</button>
    </div>
  </div>
</div>

<div id="review" class="screen">
  <div class="review-wrap">
    <button class="back-btn" onclick="showResult()">← 결과로 돌아가기</button>
    <h2>📝 전체 풀이 &amp; 해설</h2>
    <div id="reviewList"></div>
  </div>
</div>

<script src="questions.js"></script>

<script>
// ══════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('toggleIcon').textContent = isDark ? '☀️' : '🌙';
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let selectedSubjects = [1,2,3,4];
let allQ = [];
let curIdx = 0;
let answered = [];
let timerInterval = null;
let seconds = 7200;

// ══════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════
function toggleSubj(n) {
  const idx = selectedSubjects.indexOf(n);
  if(idx > -1) { if(selectedSubjects.length > 1) selectedSubjects.splice(idx,1); }
  else selectedSubjects.push(n);
  updateSubjBtns();
}

function toggleAll() {
  selectedSubjects = [1,2,3,4];
  updateSubjBtns();
}

function updateSubjBtns() {
  document.getElementById('btnAll').className = 'subject-btn ' + (selectedSubjects.length===4?'sel-all':'');
  [1,2,3,4].forEach(n => {
    const btn = document.getElementById('btn'+n);
    btn.className = 'subject-btn ' + (selectedSubjects.includes(n)?'sel':'');
  });
}

function buildExam(subjects) {
  let selected = [];
  subjects.forEach(subj => {
    const pool = QUESTION_BANK.filter(q => q.subj === subj);
    const shuffledPool = shuffle([...pool]);
    selected = selected.concat(shuffledPool.slice(0, 20));
  });
  selected = selected.map(q => {
    const indexed = q.choices.map((c, i) => ({c, isAns: i === q.ans}));
    const shuffledChoices = shuffle([...indexed]);
    return {
      ...q,
      choices: shuffledChoices.map(x => x.c),
      ans: shuffledChoices.findIndex(x => x.isAns)
    };
  });
  return shuffle(selected);
}

function startExam() {
  allQ = buildExam(selectedSubjects);
  if(document.getElementById('shuffleChk').checked) {
    allQ = shuffle([...allQ]);
  }
  answered = new Array(allQ.length).fill(null);
  curIdx = 0;
  seconds = 7200;
  showScreen('quiz');
  startTimer();
  renderQ();
}

function shuffle(arr) {
  for(let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds--;
    const m = Math.floor(seconds/60).toString().padStart(2,'0');
    const s = (seconds%60).toString().padStart(2,'0');
    document.getElementById('timer').textContent = m+':'+s;
    if(seconds <= 0) { clearInterval(timerInterval); finishExam(); }
  }, 1000);
}

// ══════════════════════════════════════════
//  RENDER QUESTION
// ══════════════════════════════════════════
const SUBJ_NAMES = {1:'1과목: 분석 기획', 2:'2과목: 탐색', 3:'3과목: 모델링', 4:'4과목: 결과해석'};

function renderQ() {
  const q = allQ[curIdx];
  const total = allQ.length;
  document.getElementById('subjLabel').textContent = SUBJ_NAMES[q.subj];
  document.getElementById('qCounter').textContent = `${curIdx+1} / ${total}`;
  document.getElementById('qNum').textContent = `문제 ${curIdx+1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = ((curIdx+1)/total*100)+'%';

  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = '';
  const markers = ['①','②','③','④'];
  q.choices.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="choice-marker">${markers[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  document.getElementById('btnNext').className = 'btn-next';

  const prev = answered[curIdx];
  if(prev !== null) showFeedback(prev.selected, q.ans, q.exp, false);
}

function selectAnswer(i) {
  if(answered[curIdx] !== null) return;
  const q = allQ[curIdx];
  const correct = (i === q.ans);
  answered[curIdx] = { selected: i, correct };
  showFeedback(i, q.ans, q.exp, true);
}

function showFeedback(selected, ans, exp, animate) {
  const choices = document.querySelectorAll('.choice');
  choices.forEach((c,i) => {
    c.classList.add('disabled');
    if(i === ans) c.classList.add('correct');
    else if(i === selected && selected !== ans) c.classList.add('wrong');
  });

  const fb = document.getElementById('feedbackBox');
  const isCorrect = (selected === ans);
  fb.className = 'feedback-box show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  document.getElementById('fbTitle').textContent = isCorrect ? '✅ 정답입니다!' : '❌ 오답입니다';
  document.getElementById('fbBody').innerHTML = `<strong>정답: </strong>${['①','②','③','④'][ans]} ${allQ[curIdx]?.choices[ans] ?? ''}<br><br><strong>해설: </strong>${exp}`;
  document.getElementById('btnNext').className = 'btn-next show';
}

function nextQ() {
  curIdx++;
  if(curIdx >= allQ.length) { finishExam(); return; }
  renderQ();
}

// ══════════════════════════════════════════
//  FINISH
// ══════════════════════════════════════════
function finishExam() {
  clearInterval(timerInterval);

  const subjScore = {1:{correct:0,total:0},2:{correct:0,total:0},3:{correct:0,total:0},4:{correct:0,total:0}};
  allQ.forEach((q,i) => {
    const s = q.subj;
    subjScore[s].total++;
    if(answered[i]?.correct) subjScore[s].correct++;
  });

  let totalCorrect = 0, totalQ = allQ.length;
  Object.values(subjScore).forEach(v => totalCorrect += v.correct);
  const totalPct = Math.round(totalCorrect/totalQ*100) || 0;
  document.getElementById('totalScore').textContent = totalPct + '점';

  const grid = document.getElementById('subjResultGrid');
  grid.innerHTML = '';
  let allPass = true;
  selectedSubjects.forEach(n => {
    const s = subjScore[n];
    if(s.total === 0) return;
    const pct = Math.round(s.correct/s.total*100);
    const pass = pct >= 40;
    if(!pass) allPass = false;
    const div = document.createElement('div');
    div.className = 'subj-result-item';
    div.innerHTML = `<div class="subj-name">${SUBJ_NAMES[n]}</div><div class="subj-score ${pass?'pass':'fail'}">${pct}점 (${s.correct}/${s.total})</div><div style="font-size:.78rem;margin-top:.2rem">${pass?'✅ 과락 없음':'❌ 과락'}</div>`;
    grid.appendChild(div);
  });

  const finalPass = allPass && totalPct >= 60;
  const msg = document.getElementById('resultMsg');
  msg.className = 'result-msg ' + (finalPass?'pass':'fail');
  msg.textContent = finalPass ? '🎉 합격 기준을 충족했습니다!' : '📚 아직 조금 더 공부가 필요해요. 오답 해설을 확인하세요!';

  showScreen('result');
}

// ══════════════════════════════════════════
//  REVIEW
// ══════════════════════════════════════════
function showReview() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  const markers = ['①','②','③','④'];
  allQ.forEach((q,i) => {
    const a = answered[i];
    if(!a) return;
    const div = document.createElement('div');
    div.className = 'review-item ' + (a.correct?'r-correct':'r-wrong');
    let choicesHtml = '';
    q.choices.forEach((c,ci) => {
      let cls = '';
      if(ci === q.ans) cls = 'rc-correct';
      else if(ci === a.selected && !a.correct) cls = 'rc-wrong-sel';
      choicesHtml += `<div class="review-choice ${cls}">${markers[ci]} ${c}${ci===q.ans?' ✅':''}${ci===a.selected&&!a.correct?' ❌':''}</div>`;
    });
    div.innerHTML = `
      <div class="review-q">[${SUBJ_NAMES[q.subj]}] ${q.q}</div>
      <div class="review-choices">${choicesHtml}</div>
      <div class="review-exp"><strong>💡 해설:</strong> ${q.exp}</div>`;
    list.appendChild(div);
  });
  showScreen('review');
}

function showResult() { showScreen('result'); }
function goHome() { clearInterval(timerInterval); showScreen('home'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
</script>
</body>
</html>
