<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빅데이터분석기사 필기 CBT</title>
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --correct: #22c55e;
    --wrong: #ef4444;
    --neutral: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --sub: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: #f0f4f8; color: var(--text); min-height: 100vh; }

  /* ── SCREEN MANAGEMENT ── */
  .screen { display: none !important; }
  .screen.active { display: block !important; }
  #home.active { display: flex !important; }
  #result.active { display: flex !important; }

  /* ── HOME ── */
  #home { min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .home-card { background: var(--card); border-radius: 20px; padding: 3rem 2.5rem; max-width: 560px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,.12); text-align: center; }
  .home-card h1 { font-size: 1.9rem; color: var(--primary); margin-bottom: .4rem; }
  .home-card p { color: var(--sub); margin-bottom: 2rem; font-size: .95rem; }
  .badge-row { display: flex; justify-content: center; gap: .8rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .badge { background: var(--neutral); padding: .35rem .9rem; border-radius: 999px; font-size: .82rem; color: var(--sub); }
  .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin-bottom: 2rem; }
  .subject-btn { padding: .9rem; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; font-size: .9rem; font-weight: 600; color: var(--primary); transition: all .2s; }
  .subject-btn:hover, .subject-btn.sel { border-color: var(--accent); background: #fff1f3; color: var(--accent); }
  .subject-btn.sel-all { border-color: var(--primary); background: var(--primary); color: white; }
  .start-btn { width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: opacity .2s; }
  .start-btn:hover { opacity: .88; }
  .shuffle-row { display: flex; align-items: center; justify-content: center; gap: .5rem; margin-bottom: 1.5rem; font-size: .9rem; color: var(--sub); }
  .shuffle-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }

  /* ── QUIZ ── */
  #quiz { min-height: 100vh; padding: 1rem; }
  .quiz-wrap { max-width: 700px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .top-bar .subj-label { background: var(--primary); color: white; padding: .3rem .9rem; border-radius: 999px; font-size: .82rem; font-weight: 600; }
  .top-bar .q-counter { color: var(--sub); font-size: .9rem; }
  .timer { font-size: .9rem; font-weight: 700; color: var(--accent); }
  .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
  .q-card { background: var(--card); border-radius: 16px; padding: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,.08); margin-bottom: 1rem; }
  .q-card .q-num { font-size: .82rem; color: var(--sub); margin-bottom: .6rem; }
  .q-card .q-text { font-size: 1.02rem; font-weight: 600; line-height: 1.65; color: var(--text); }
  .choices { display: flex; flex-direction: column; gap: .7rem; margin-top: 1.2rem; }
  .choice { display: flex; align-items: flex-start; gap: .8rem; padding: .9rem 1.1rem; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all .2s; background: white; font-size: .95rem; line-height: 1.5; text-align: left; }
  .choice:hover:not(.disabled) { border-color: #94a3b8; background: var(--neutral); }
  .choice.correct { border-color: var(--correct); background: #f0fdf4; color: #166534; font-weight: 600; }
  .choice.wrong { border-color: var(--wrong); background: #fef2f2; color: #991b1b; }
  .choice.show-correct { border-color: var(--correct); background: #f0fdf4; }
  .choice.disabled { cursor: default; }
  .choice-marker { font-weight: 700; min-width: 22px; }
  .feedback-box { border-radius: 12px; padding: 1rem 1.2rem; font-size: .92rem; line-height: 1.6; display: none; }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { background: #f0fdf4; border: 1.5px solid #86efac; color: #166534; }
  .feedback-box.wrong-fb { background: #fef2f2; border: 1.5px solid #fca5a5; color: #991b1b; }
  .fb-title { font-weight: 700; margin-bottom: .3rem; }
  .nav-row { display: flex; gap: .7rem; justify-content: flex-end; }
  .btn-next { padding: .7rem 1.6rem; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: .95rem; font-weight: 600; cursor: pointer; display: none; }
  .btn-next.show { display: block; }
  .btn-next:hover { opacity: .85; }

  /* ── RESULT ── */
  #result { min-height: 100vh; align-items: center; justify-content: center; padding: 2rem; }
  .result-card { background: var(--card); border-radius: 20px; padding: 2.5rem 2rem; max-width: 620px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,.12); }
  .result-card h2 { text-align: center; font-size: 1.6rem; color: var(--primary); margin-bottom: .5rem; }
  .score-circle { width: 130px; height: 130px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 1.5rem auto; border: 8px solid var(--accent); }
  .score-circle .score-num { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
  .score-circle .score-label { font-size: .8rem; color: var(--sub); }
  .subj-result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin: 1.5rem 0; }
  .subj-result-item { border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 1rem; text-align: center; }
  .subj-result-item .subj-name { font-size: .82rem; color: var(--sub); margin-bottom: .4rem; }
  .subj-result-item .subj-score { font-size: 1.3rem; font-weight: 800; }
  .subj-result-item .pass { color: var(--correct); }
  .subj-result-item .fail { color: var(--wrong); }
  .result-msg { text-align: center; font-size: 1.05rem; font-weight: 600; margin-bottom: 1.5rem; padding: .8rem; border-radius: 10px; }
  .result-msg.pass { background: #f0fdf4; color: #166534; }
  .result-msg.fail { background: #fef2f2; color: #991b1b; }
  .btn-row { display: flex; gap: .8rem; flex-wrap: wrap; }
  .btn-row button { flex: 1; min-width: 140px; padding: .85rem; border-radius: 10px; border: none; font-size: .95rem; font-weight: 600; cursor: pointer; }
  .btn-review { background: var(--primary); color: white; }
  .btn-home { background: var(--neutral); color: var(--text); }

  /* ── REVIEW ── */
  #review { padding: 1.5rem; }
  .review-wrap { max-width: 700px; margin: 0 auto; }
  .review-wrap h2 { font-size: 1.3rem; color: var(--primary); margin-bottom: 1.5rem; }
  .review-item { background: var(--card); border-radius: 14px; padding: 1.4rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .review-item.r-correct { border-left: 4px solid var(--correct); }
  .review-item.r-wrong { border-left: 4px solid var(--wrong); }
  .review-q { font-weight: 600; font-size: .97rem; margin-bottom: .8rem; line-height: 1.6; }
  .review-choices { display: flex; flex-direction: column; gap: .4rem; font-size: .9rem; }
  .review-choice { padding: .5rem .8rem; border-radius: 8px; }
  .review-choice.rc-correct { background: #f0fdf4; color: #166534; font-weight: 600; }
  .review-choice.rc-wrong-sel { background: #fef2f2; color: #991b1b; }
  .review-exp { margin-top: .8rem; padding: .7rem .9rem; background: #f8fafc; border-radius: 8px; font-size: .88rem; color: var(--sub); line-height: 1.6; }
  .review-exp strong { color: var(--text); }
  .back-btn { display: inline-block; margin-bottom: 1.2rem; padding: .5rem 1.2rem; background: var(--neutral); border: none; border-radius: 8px; cursor: pointer; font-size: .9rem; color: var(--text); }

  @media (max-width: 500px) {
    .subject-grid { grid-template-columns: 1fr; }
    .subj-result-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="home" class="screen active">
  <div class="home-card">
    <h1>📊 빅데이터분석기사</h1>
    <p>필기 모의고사 CBT</p>
    <div class="badge-row">
      <span class="badge">총 80문항</span>
      <span class="badge">과목당 20문항</span>
      <span class="badge">합격 평균 60점</span>
      <span class="badge">과목 40점 이상</span>
    </div>
    <p style="font-size:.88rem;color:var(--sub);margin-bottom:1rem;text-align:left">풀 과목 선택</p>
    <div class="subject-grid">
      <button class="subject-btn sel-all" id="btnAll" onclick="toggleAll()">전 과목</button>
      <button class="subject-btn" id="btn1" onclick="toggleSubj(1)">1과목: 분석 기획</button>
      <button class="subject-btn" id="btn2" onclick="toggleSubj(2)">2과목: 탐색</button>
      <button class="subject-btn" id="btn3" onclick="toggleSubj(3)">3과목: 모델링</button>
      <button class="subject-btn" id="btn4" onclick="toggleSubj(4)">4과목: 결과해석</button>
    </div>
    <div class="shuffle-row">
      <input type="checkbox" id="shuffleChk" checked>
      <label for="shuffleChk">문제 순서 섞기</label>
    </div>
    <button class="start-btn" onclick="startExam()">시험 시작</button>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div id="quiz" class="screen">
  <div class="quiz-wrap">
    <div class="top-bar">
      <span class="subj-label" id="subjLabel"></span>
      <span class="q-counter" id="qCounter"></span>
      <span class="timer" id="timer">120:00</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="q-card">
      <div class="q-num" id="qNum"></div>
      <div class="q-text" id="qText"></div>
      <div class="choices" id="choicesWrap"></div>
    </div>
    <div class="feedback-box" id="feedbackBox">
      <div class="fb-title" id="fbTitle"></div>
      <div id="fbBody"></div>
    </div>
    <div class="nav-row">
      <button class="btn-next" id="btnNext" onclick="nextQ()">다음 문제 →</button>
    </div>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div id="result" class="screen">
  <div class="result-card">
    <h2>시험 결과</h2>
    <div class="score-circle">
      <span class="score-num" id="totalScore">0</span>
      <span class="score-label">총 점수</span>
    </div>
    <div class="subj-result-grid" id="subjResultGrid"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="btn-row">
      <button class="btn-review" onclick="showReview()">오답 & 해설 보기</button>
      <button class="btn-home" onclick="goHome()">다시 풀기</button>
    </div>
  </div>
</div>

<!-- ══ REVIEW ══ -->
<div id="review" class="screen">
  <div class="review-wrap">
    <button class="back-btn" onclick="showResult()">← 결과로 돌아가기</button>
    <h2>📝 전체 풀이 & 해설</h2>
    <div id="reviewList"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  QUESTION BANK
// ══════════════════════════════════════════
const QUESTIONS = [
  // ── 1과목: 빅데이터 분석 기획 ──
  { subj:1, q:"DIKW 피라미드에서 '지식(Knowledge)'에 해당하는 것은?", choices:["가공되지 않은 객관적 사실","데이터로부터 패턴을 인식한 결과","패턴을 통해 의사결정에 활용하는 단계","창의적인 전략을 도출하는 최상위 단계"], ans:2, exp:"DIKW: Data(사실) → Information(패턴 인식) → Knowledge(의사결정 활용) → Wisdom(창의적 전략). Knowledge는 패턴을 통해 실제 의사결정에 활용하는 단계입니다." },
  { subj:1, q:"암묵지에서 형식지로 변환되는 과정은?", choices:["공통화","표출화","연결화","내면화"], ans:1, exp:"암묵지↔형식지 상호작용: ①공통화(암묵지→타인 공유) ②표출화(암묵지→문서/매뉴얼) ③연결화(형식지에 새 지식 추가) ④내면화(형식지→암묵지). '표출화'가 암묵지를 형식지로 변환합니다." },
  { subj:1, q:"빅데이터의 3V(가트너 정의)에 해당하지 않는 것은?", choices:["Volume(규모)","Variety(다양성)","Velocity(속도)","Veracity(신뢰성)"], ans:3, exp:"가트너의 3V는 Volume·Variety·Velocity입니다. Veracity(신뢰성)는 5V/7V에 추가되는 요소로, 3V에는 포함되지 않습니다." },
  { subj:1, q:"데이터베이스 설계 절차를 올바른 순서로 나열한 것은?", choices:["개념적→물리적→논리적","논리적→개념적→물리적","물리적→논리적→개념적","개념적→논리적→물리적"], ans:3, exp:"DB 설계 절차: 개념적 설계(ERD 작성) → 논리적 설계(테이블 변환) → 물리적 설계(스토리지 고려). 암기법: '개논물'" },
  { subj:1, q:"SQL DCL(데이터 제어 언어)에 해당하는 명령어로만 묶인 것은?", choices:["CREATE, ALTER, DROP","SELECT, INSERT, UPDATE","GRANT, REVOKE","COMMIT, ROLLBACK"], ans:2, exp:"DCL은 데이터 접근 권한 제어 언어로 GRANT(권한 부여), REVOKE(권한 회수)입니다. DDL: CREATE·ALTER·DROP / DML: SELECT·INSERT·DELETE·UPDATE / TCL: COMMIT·ROLLBACK" },
  { subj:1, q:"개인정보 비식별화 방법 중 '가명처리'에 해당하는 예는?", choices:["홍길동,35세→평균 키 175cm","홍길동,35세→홍OO,35세","홍길동,35세→임꺽정,30세","홍길동,35세→홍길동,30~40세"], ans:2, exp:"가명처리: 가명(임꺽정,30세)으로 대체 / 마스킹: 홍OO / 총계처리: 평균값 / 범주화: 30~40세. 가명정보는 추가 정보와 결합하면 개인 특정 가능합니다." },
  { subj:1, q:"프라이버시 보호 모델 중 '동질성 공격과 배경지식 공격'으로부터 보호하는 모델은?", choices:["k-익명성","l-다양성","t-근접성","차등정보보호"], ans:1, exp:"k-익명성→연결공격 보호 / l-다양성→동질성 공격·배경지식 공격 보호 / t-근접성→쏠림·유사성 공격 보호. l-다양성은 민감 정보의 다양성을 높여 추론 가능성을 낮춥니다." },
  { subj:1, q:"CRISP-DM 분석 방법론의 올바른 순서는?", choices:["업무이해→데이터이해→데이터준비→모델링→평가→전개","데이터이해→업무이해→모델링→데이터준비→평가→전개","업무이해→모델링→데이터준비→데이터이해→평가→전개","데이터준비→업무이해→데이터이해→모델링→전개→평가"], ans:0, exp:"CRISP-DM: 업무이해→데이터이해→데이터준비→모델링→평가→전개. 암기법: '업데데이트모델평가전'" },
  { subj:1, q:"KDD 분석 방법론에서 이상값과 잡음을 식별하고 데이터를 가공하는 단계는?", choices:["데이터 선택","전처리","변환","마이닝"], ans:1, exp:"KDD: 데이터 선택→전처리(이상값·잡음 처리)→변환(차원축소)→마이닝(알고리즘 적용)→평가" },
  { subj:1, q:"빅데이터 분석 수준 진단에서 '조직·인력 준비도는 높으나 분석업무·기법이 부족한 유형'은?", choices:["준비형","정착형","도입형","확산형"], ans:2, exp:"도입형: 준비도 높음, 분석업무·기법 부족 / 준비형: 전반적 준비 안 됨 / 정착형: 제한적 사용 / 확산형: 모든 요소 갖춤. 암기법: '도준정확'(4사분면 시계방향 역순)" },
  { subj:1, q:"빅데이터 플랫폼 계층 중 '데이터 수집·정제·처리·분석'을 담당하는 계층은?", choices:["인프라스트럭처 계층","플랫폼 계층","소프트웨어 계층","네트워크 계층"], ans:2, exp:"소프트웨어 계층(상위): 수집·정제·처리·분석·사용자관리 / 플랫폼 계층(중간): 데이터·자원 관리·스케줄링 / 인프라스트럭처 계층(하위): 자원 배치·저장장치·네트워크" },
  { subj:1, q:"다음 중 비정형 데이터의 예로 가장 적절한 것은?", choices:["관계형 DB의 테이블","XML 파일","JSON 파일","SNS 게시물과 유튜브 영상"], ans:3, exp:"정형: 관계형DB·CSV / 반정형: HTML·XML·JSON·RDF(메타데이터 포함) / 비정형: SNS·유튜브·음원·이미지처럼 구조화되지 않은 자유로운 형태" },
  { subj:1, q:"하둡 에코시스템에서 분산 코디네이터 역할을 하는 것은?", choices:["Flume","Kafka","Zookeeper","HBase"], ans:2, exp:"Zookeeper: 분산 코디네이터 / YARN·Mesos: 분산 리소스관리 / HBase·HDFS: 데이터 저장 / Flume·Kafka: 데이터 수집 / Pig·Spark·Hive: 데이터 처리" },

  { subj:3, q:"선형회귀분석의 4가지 가정에 해당하지 않는 것은?", choices:["선형성","등분산성","정규성","다중공선성"], ans:3, exp:"선형회귀분석 4대 가정: 선형성·등분산성·정규성·독립성. 암기법: '선분정독'. 다중공선성은 가정이 아니라 '위반 시 문제가 되는 현상'입니다." },
  { subj:3, q:"다중공선성 진단 방법으로 옳지 않은 것은?", choices:["변수간 상관계수 절댓값 0.8 이상이면 의심","VIF 값이 10 이상이면 존재","조건수가 30 이상이면 의심","R-square 값이 0.9 이상이면 의심"], ans:3, exp:"다중공선성 진단: ①변수간 상관계수 |r|≥0.8 ②VIF≥10 ③조건수≥30. R-square는 모형 설명력 지표로 다중공선성 직접 진단에 사용하지 않습니다." },
  { subj:3, q:"라쏘(Lasso) 회귀에 사용되는 규제 항은?", choices:["L2 규제(∑β²)","L1 규제(∑|β|)","L1과 L2 동시 사용","규제 항 없음"], ans:1, exp:"Lasso(L1): ∑|β| 규제 → 일부 계수를 완전히 0으로 만들어 변수 선택 효과. Ridge(L2): ∑β² 규제 → 계수를 0에 가깝게 축소. 엘라스틱넷: L1+L2 동시 적용." },
  { subj:3, q:"의사결정나무에서 CART 알고리즘이 분류 문제에 사용하는 분할 기준은?", choices:["카이제곱 통계량","엔트로피지수","지니지수","F-통계량"], ans:2, exp:"CART 분류: 지니지수(1-∑p²) / CART 회귀: 분산감소량 / CHAID 분류: 카이제곱 통계량 / C4.5/C5.0: 엔트로피지수 (-∑p·log₂p)" },
  { subj:3, q:"인공신경망에서 '기울기 소실 문제를 극복'하기 위해 주로 사용하는 활성함수는?", choices:["시그모이드 함수","하이퍼볼릭 탄젠트(Tanh)","ReLU 함수","소프트맥스 함수"], ans:2, exp:"시그모이드: 0~1, 기울기 소실 문제 발생. Tanh: -1~1, 기울기 소실 지연. ReLU: max(0,x), 기울기 소실 극복, 은닉층에서 주로 사용. 소프트맥스: 다중분류 출력층." },
  { subj:3, q:"인공신경망의 과적합 방지 방법 중 '일부 퍼셉트론을 비활성화시켜 학습'하는 방법은?", choices:["L1/L2 규제","드롭아웃(Dropout)","조기종료","배치정규화"], ans:1, exp:"드롭아웃: 학습 시 무작위로 일부 노드를 비활성화하여 과적합 방지. 규제: 가중치 페널티. 조기종료: 검증오차 증가 시점에 학습 중단. 배치정규화: 각 출력마다 정규화." },
  { subj:3, q:"연관분석의 '신뢰도(Confidence)'에 대한 설명으로 옳은 것은?", choices:["A와 B가 동시에 포함된 거래 비율","A가 거래될 때 B도 거래될 조건부 확률","A와 B의 상관성을 나타내는 지표","전체 거래에서 A만 포함된 비율"], ans:1, exp:"지지도: P(A∩B)/전체 / 신뢰도: P(A∩B)/P(A) = A 거래 시 B도 거래될 조건부 확률 / 향상도: P(A∩B)/(P(A)·P(B)) > 1이면 양의 상관관계." },
  { subj:3, q:"K-means 군집화에 대한 설명으로 옳지 않은 것은?", choices:["군집 수 K를 사전에 지정해야 한다","이상치와 초기 중심점 설정에 민감","밀도 기반 군집화 방법이다","데이터를 가장 가까운 군집에 할당"], ans:2, exp:"K-means는 '거리 기반' 비계층적 군집화입니다. '밀도 기반'은 DBSCAN입니다. K-means는 이상치 민감, K 사전 지정 필요, Elbow Method로 최적 K 선택." },
  { subj:3, q:"ARIMA(p,d,q)에서 'd'가 의미하는 것은?", choices:["AR 모형의 차수","MA 모형의 차수","정상화 시 차분한 횟수","데이터 개수"], ans:2, exp:"ARIMA(p,d,q): p=AR 차수, d=차분 횟수(정상화), q=MA 차수. d=0이면 ARMA, p=0이면 IMA, q=0이면 ARI 모델. 계절성이 있으면 SARIMA 고려." },
  { subj:3, q:"앙상블 기법 중 '잘못 분류된 데이터에 큰 가중치를 주는 방법'으로 이상치에 민감한 기법은?", choices:["보팅(Voting)","배깅(Bagging)","부스팅(Boosting)","스태킹(Stacking)"], ans:2, exp:"부스팅: 오분류 데이터에 가중치 증가, 이상치 민감. 종류: AdaBoost·GBM·XGBoost·LightGBM. 배깅: 복원추출 기반, 병렬처리 가능. 부스팅: 순차 학습, 병렬처리 불가." },
  { subj:3, q:"이미지에서 패턴을 찾는 데 특화된 딥러닝 신경망은?", choices:["RNN","LSTM","CNN","GRU"], ans:2, exp:"CNN(합성곱 신경망): Convolution Layer + Pooling Layer로 이미지 패턴 추출. 구조: Input→Conv→Pooling→Flatten→FC. RNN/LSTM/GRU: 순차 데이터(시계열·텍스트) 처리에 특화." },
  { subj:3, q:"트랜스포머 모델에서 BERT에 대한 설명으로 옳은 것은?", choices:["OpenAI 개발, 디코더 구조","구글 개발, 인코더 구조, 양방향 학습","이전 단어로 다음 단어를 예측, 일방향","이미지 처리에 특화"], ans:1, exp:"BERT: 구글 개발, 인코더 구조, 문장 중간 빈칸 예측(양방향 학습). GPT: OpenAI 개발, 디코더 구조, 이전 단어로 다음 단어 예측(일방향). 둘 다 트랜스포머 기반입니다." },
  { subj:3, q:"SVM에서 '마진 내 어느 정도 오류를 허용하는' 유형은?", choices:["하드마진분류","소프트마진분류","커널 SVM","RBF SVM"], ans:1, exp:"하드마진: 오류 비허용(선형 분리 가능한 경우만 적용). 소프트마진: 마진 내 일부 오류 허용(실제 문제에 주로 적용). 커널함수: 저차원→고차원 변환으로 비선형 문제 해결." },
  { subj:3, q:"시계열 분석에서 '현 시점에서 이전 값을 빼서 평균을 일정하게 만드는' 방법은?", choices:["변환","차분","평활화","로그변환"], ans:1, exp:"차분: 현재 값 - 이전 값으로 추세를 제거하여 평균을 일정하게 만듦(정상성 확보). 변환(로그·제곱근·Box-Cox): 분산을 안정화. 평활화(이동평균·지수평활): 패턴 파악." },
  { subj:3, q:"로지스틱 회귀분석에서 회귀계수를 추정하는 방법은?", choices:["최소제곱법","최대우도법","경사하강법","라그랑주 승수법"], ans:1, exp:"로지스틱 회귀: 종속변수가 범주형(이진). 회귀계수 추정: 최대우도법(MLE). 모형전체 검정: 우도비검정(카이제곱검정). 일반 선형회귀의 회귀계수 추정은 최소제곱법." },
  { subj:3, q:"랜덤포레스트에 대한 설명으로 옳은 것은?", choices:["부스팅에 의사결정나무 추가","배깅에 의사결정나무 추가","스태킹에 의사결정나무 추가","보팅에 의사결정나무 추가"], ans:1, exp:"랜덤포레스트: 배깅(Bootstrap Aggregating) + 의사결정나무. 블랙박스 모델, 분산 감소(과적합 강함). 변수 일부만 무작위 선택 → 나무 간 상관성 감소." },
  { subj:3, q:"TF-IDF에서 IDF가 의미하는 것은?", choices:["특정 문서 내 단어 등장 빈도","전체 문서에서 해당 단어의 희소성","단어 간 의미적 유사도","단어의 품사 정보"], ans:1, exp:"TF(Term Frequency): 특정 문서 내 단어 빈도. IDF(Inverse Document Frequency): 전체 문서에서 단어의 희소성(자주 등장하면 낮은 가중치). TF-IDF = TF × IDF." },
  { subj:3, q:"시계열 분해에서 '알려지지 않은 주기를 갖고 변화하는 요인'은?", choices:["추세 요인","계절 요인","순환 요인","불규칙 요인"], ans:2, exp:"분해시계열 4요인: 추세(장기 증감)·계절(고정 주기 변화)·순환(알려지지 않은 주기)·불규칙(설명 불가). 암기법: '추운 계절의 순환이 불규칙하다'" },
  { subj:3, q:"DBSCAN 군집화의 특징으로 옳은 것은?", choices:["군집 수를 사전에 반드시 정해야 한다","노이즈와 이상치에 약하다","군집 수를 사전에 정하지 않아도 된다","거리 기반 군집화 방법이다"], ans:2, exp:"DBSCAN(밀도 기반): 군집 수 사전 지정 불필요, 노이즈·이상치에 강함, Eps(반경)와 MinPts(최소 포인트 수) 설정 필요. K-means: 거리 기반, K 사전 지정 필요." },
  { subj:3, q:"앙상블 기법 중 '병렬처리가 가능한' 기법으로만 묶인 것은?", choices:["배깅, 부스팅","보팅, 배깅, 랜덤포레스트","부스팅, 스태킹","보팅, 부스팅, 스태킹"], ans:1, exp:"병렬처리 가능: 보팅·배깅·랜덤포레스트(독립적 모델 학습). 병렬처리 불가: 부스팅(이전 모델 결과에 순차 의존). 스태킹은 1차 모델 학습 후 메타 학습기 사용." },

  // ── 4과목: 빅데이터 결과해석 ──
  { subj:4, q:"혼동행렬에서 'F-1 Score'에 대한 설명으로 옳은 것은?", choices:["정밀도(Precision)만 이용한 지표","재현율(Recall)만 이용한 지표","정밀도와 재현율의 조화평균","정밀도와 재현율의 산술평균"], ans:2, exp:"F-1 Score = 2×(Precision×Recall)/(Precision+Recall) = 조화평균. Fβ Score에서 β<1이면 정밀도 중시, β>1이면 재현율 중시. Precision과 Recall은 Trade-Off 관계." },
  { subj:4, q:"ROC 커브에서 AUC 값의 범위와 해석으로 옳은 것은?", choices:["0~1 범위이며, 0에 가까울수록 성능 좋음","0.5~1 범위이며, 1에 가까울수록 성능 좋음","0~1 범위이며, 0.5가 최적","1~2 범위이며, 2에 가까울수록 성능 좋음"], ans:1, exp:"ROC 커브: X축=FPR(1-특이도), Y축=TPR(민감도). AUC=0.5~1이며 1에 가까울수록 좋은 모델. AUC=0.5는 랜덤 분류 수준(무의미한 모델)." },
  { subj:4, q:"회귀 평가지표 중 이상치에 덜 민감한 지표는?", choices:["MSE(Mean Squared Error)","RMSE(Root Mean Squared Error)","MAE(Mean Absolute Error)","MAPE(Mean Absolute Percentage Error)"], ans:2, exp:"MSE/RMSE: 오차를 제곱하므로 이상치에 민감. MAE: 절댓값 사용으로 이상치에 덜 민감. MAPE: 백분율 오차, 실제값이 0에 가까우면 왜곡될 수 있음." },
  { subj:4, q:"군집분석 평가지표 중 '군집 간 거리의 최솟값을 군집 내 거리의 최댓값으로 나눈 비율'은?", choices:["실루엣 계수","Dunn Index","WCSS","Elbow Method"], ans:1, exp:"Dunn Index: 군집 간 거리(최솟값)/군집 내 거리(최댓값) → 클수록 좋음. 실루엣 계수: -1~1, 1에 가까울수록 좋음. WCSS: 군집 내 거리 제곱합 → 작을수록 좋음." },
  { subj:4, q:"과대적합(Overfitting)의 특성으로 옳은 것은?", choices:["높은 편향, 낮은 분산","낮은 편향, 높은 분산","높은 편향, 높은 분산","낮은 편향, 낮은 분산"], ans:1, exp:"과대적합: 낮은 편향(훈련 데이터 완벽 학습)·높은 분산(새 데이터에 민감). 과소적합: 높은 편향·낮은 분산. 최적 모델: 분산-편향 Trade-Off의 균형점." },
  { subj:4, q:"K-fold 교차검증에 대한 설명으로 옳은 것은?", choices:["전체 데이터를 학습·검증으로 한 번만 분리","1개 데이터로만 검증, 나머지로 학습","데이터를 k개로 나누어 k-1개 학습, 1개 검증","복원추출로 데이터셋 생성"], ans:2, exp:"K-fold: 데이터를 k개 폴드로 분할, k-1개 학습+1개 검증을 k번 반복. 홀드아웃: 한 번 분리. LOOCV: 1개로 검증(연산량 많음). 부트스트래핑: 복원추출." },
  { subj:4, q:"하이퍼파라미터 튜닝 방법 중 '모든 조합을 탐색'하는 방법은?", choices:["Manual Search","Grid Search","Random Search","Bayesian Optimization"], ans:1, exp:"Grid Search: 모든 조합 탐색(정확하지만 시간 소요). Random Search: 임의 탐색(빠름). Bayesian Optimization: 이전 결과를 모델링하여 최적 조합 찾기. Manual Search: 경험·감으로 설정." },
  { subj:4, q:"등분산성 검정에 사용하는 검정 방법은?", choices:["Shapiro-Wilk 검정","Q-Q Plot","Levene 검정","콜모고로프-스미르노프 검정"], ans:2, exp:"정규성 검정: Shapiro-Wilk, Q-Q Plot, 콜모고로프-스미르노프. 등분산성 검정: Levene 검정, F-검정. 독립성 검정: 더빈-왓슨(Durbin-Watson) 검정." },
  { subj:4, q:"경사하강법에서 학습률(Learning Rate)이 너무 클 때 발생하는 문제는?", choices:["수렴 시간이 오래 걸림","이전보다 높은 곳으로 발산","지역 극솟값에 갇힘","모델이 단순해짐"], ans:1, exp:"학습률 너무 클 때: 최솟값을 지나쳐 발산(overshooting). 학습률 너무 작을 때: 수렴에 오랜 시간 소요. 옵티마이저(Adam, Momentum 등)로 학습률을 자동 조절합니다." },
  { subj:4, q:"경사하강법 옵티마이저 중 'Momentum과 RMSProp의 장점을 결합한' 것은?", choices:["Adagrad","RMSProp","Adam","Momentum"], ans:2, exp:"Adam: Momentum(이전 기울기 반영)과 RMSProp(지수이동평균으로 학습률 조절)의 결합. Adagrad: 누적 기울기로 학습률 조정(시간 지남에 따라 학습률 감소). 실제 학습에서 Adam이 가장 많이 사용됩니다." },
  { subj:4, q:"박스플롯(Box Plot) 해석에서 옳지 않은 것은?", choices:["Q2 위치로 중앙값 파악 가능","박스의 넓이로 IQR 비교 가능","MAX를 벗어나는 데이터는 이상치","박스플롯으로 평균값을 정확히 알 수 있다"], ans:3, exp:"박스플롯: 최솟값·Q1·Q2(중앙값)·Q3·최댓값·이상치를 표현. 평균값은 표현하지 않습니다(박스플롯의 중심은 평균이 아니라 중앙값). 평균 확인엔 별도 표시가 필요합니다." },
  { subj:4, q:"PCA(주성분 분석)에서 스크리플롯(Screeplot)을 사용하는 목적은?", choices:["데이터 이상치 탐지","적절한 주성분 개수 선택","군집 수 결정","변수간 상관관계 시각화"], ans:1, exp:"스크리플롯: X축=주성분 개수, Y축=분산 변화. 기울기가 완만해지기 직전 개수를 최적 주성분 수로 선택. PCA는 70~90% 설명력을 갖는 수를 결정하는 것이 일반적입니다." },
  { subj:4, q:"시간 시각화에서 '두 지점의 변화를 선으로 연결하는' 차트는?", choices:["영역 차트","경사 차트","버블 차트","히트맵"], ans:1, exp:"경사 차트(Slope Chart): 두 시점 간 변화를 선으로 연결. 영역 차트: 시간에 따른 누적 변화. 단계구분도: 지역별 색상 차이. 버블 차트: 3개 변수를 원의 크기로 표현." },
  { subj:4, q:"공간 시각화에서 '면적을 통해 특정 지역을 왜곡하여 데이터 값을 강조'하는 시각화는?", choices:["단계구분도","카토그램","버블 플롯 맵","히트맵"], ans:1, exp:"카토그램: 데이터 값을 강조하기 위해 지역 면적을 왜곡. 단계구분도: 색상 채도로 값 표현, 지역 왜곡 없음. 버블 플롯 맵: 지도 위 버블 크기로 값 표현." },
  { subj:4, q:"인포그래픽의 원리 중 '복잡한 설명보다 단순한 설명이 선호되어야 한다'는 원리는?", choices:["명확성의 원리","일관성의 원리","오컴의 면도날","가독성의 원리"], ans:2, exp:"오컴의 면도날: 불필요한 복잡성을 제거, 단순한 설명을 선호. 인포그래픽 기본원리: 단순성·명확성·중요성·일관성·가독성·효과성·대상독자." },
  { subj:4, q:"과대적합 방지 방안 중 '규제 관점'에 해당하는 것은?", choices:["데이터 양 증가","L1 규제(Lasso), L2 규제(Ridge)","드롭아웃","교차검증"], ans:1, exp:"과대적합 방지: ①데이터 관점(데이터 증가·증강·차원축소) ②규제 관점(L1·L2 규제) ③모델 알고리즘 관점(드롭아웃·가지치기) ④학습·검증 관점(교차검증·조기종료)" },
  { subj:4, q:"비즈니스 기여도 평가 중 '재무적 평가'에 해당하지 않는 것은?", choices:["ROI(투자 대비 효과)","NPV(순현재가치)","KPI 기반 평가","TCO(총 소유 비용)"], ans:2, exp:"재무적 평가: ROI·NPV·IRR·TCO. 비즈니스 성과 평가: KPI 기반 평가·업무 자동화율·생산성 증가율·고객 만족도. KPI는 재무적 평가가 아닌 성과 평가에 해당합니다." },
  { subj:4, q:"회귀분석 결과의 'R-square'가 의미하는 것은?", choices:["모델의 잔차 제곱합","총 변동 중 회귀모형이 설명하는 비율","회귀계수의 통계적 유의성","독립변수의 다중공선성 지표"], ans:1, exp:"R²(결정계수) = SSR/SST = 1 - SSE/SST. 0~1 범위이며, 1에 가까울수록 모형 설명력이 높음. 다중회귀에서는 변수 추가 시 R²가 항상 증가하므로 수정된 R²를 사용합니다." },
  { subj:4, q:"모수 검정의 전제 조건에 해당하지 않는 것은?", choices:["정규성","등분산성","독립성","대칭성"], ans:3, exp:"모수 검정 전제 조건: ①정규성(Shapiro-Wilk, Q-Q Plot) ②등분산성(Levene, F검정) ③독립성(더빈-왓슨 검정). '대칭성'은 모수 검정의 전제 조건이 아닙니다." },
  { subj:4, q:"독립표본 t-검정에서 p-value가 유의수준(0.05)보다 클 때의 결론은?", choices:["귀무가설을 기각한다","대립가설을 채택한다","귀무가설을 채택한다","추가 검정이 필요하다"], ans:2, exp:"p-value > α(유의수준): 귀무가설 채택(차이 없음). p-value < α: 귀무가설 기각, 대립가설 채택(차이 있음). 독립표본 t-검정은 등분산 가정 전제, 등분산 아닐 경우 Welch's t-검정 사용." },
];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let selectedSubjects = [1,2,3,4];
let allQ = [];
let curIdx = 0;
let answered = [];   // {qIndex, selected, correct}
let timerInterval = null;
let seconds = 7200;

// ══════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════
function toggleSubj(n) {
  const idx = selectedSubjects.indexOf(n);
  if(idx > -1) { if(selectedSubjects.length > 1) selectedSubjects.splice(idx,1); }
  else selectedSubjects.push(n);
  updateSubjBtns();
}
function toggleAll() {
  selectedSubjects = [1,2,3,4];
  updateSubjBtns();
}
function updateSubjBtns() {
  document.getElementById('btnAll').className = 'subject-btn ' + (selectedSubjects.length===4?'sel-all':'');
  [1,2,3,4].forEach(n => {
    const btn = document.getElementById('btn'+n);
    btn.className = 'subject-btn ' + (selectedSubjects.includes(n)?'sel':'');
  });
}

function startExam() {
  // 선택 과목 문제 필터
  let pool = QUESTIONS.filter(q => selectedSubjects.includes(q.subj));
  if(document.getElementById('shuffleChk').checked) pool = shuffle([...pool]);
  allQ = pool;
  answered = new Array(allQ.length).fill(null);
  curIdx = 0;
  seconds = 7200;
  showScreen('quiz');
  startTimer();
  renderQ();
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds--;
    const m = Math.floor(seconds/60).toString().padStart(2,'0');
    const s = (seconds%60).toString().padStart(2,'0');
    document.getElementById('timer').textContent = m+':'+s;
    if(seconds <= 0) { clearInterval(timerInterval); finishExam(); }
  }, 1000);
}

// ══════════════════════════════════════════
//  RENDER QUESTION
// ══════════════════════════════════════════
const SUBJ_NAMES = {1:'1과목: 분석 기획', 2:'2과목: 탐색', 3:'3과목: 모델링', 4:'4과목: 결과해석'};

function renderQ() {
  const q = allQ[curIdx];
  const total = allQ.length;
  document.getElementById('subjLabel').textContent = SUBJ_NAMES[q.subj];
  document.getElementById('qCounter').textContent = `${curIdx+1} / ${total}`;
  document.getElementById('qNum').textContent = `문제 ${curIdx+1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = ((curIdx+1)/total*100)+'%';

  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = '';
  const markers = ['①','②','③','④'];
  q.choices.forEach((c,i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="choice-marker">${markers[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });

  // 피드백 초기화
  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  document.getElementById('btnNext').className = 'btn-next';

  // 이미 답변한 경우
  const prev = answered[curIdx];
  if(prev !== null) showFeedback(prev.selected, q.ans, q.exp, false);
}

function selectAnswer(i) {
  if(answered[curIdx] !== null) return; // 이미 답변
  const q = allQ[curIdx];
  const correct = (i === q.ans);
  answered[curIdx] = { selected: i, correct };
  showFeedback(i, q.ans, q.exp, true);
}

function showFeedback(selected, ans, exp, animate) {
  const choices = document.querySelectorAll('.choice');
  choices.forEach((c,i) => {
    c.classList.add('disabled');
    if(i === ans) c.classList.add('correct');
    else if(i === selected && selected !== ans) c.classList.add('wrong');
  });

  const fb = document.getElementById('feedbackBox');
  const isCorrect = (selected === ans);
  fb.className = 'feedback-box show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  document.getElementById('fbTitle').textContent = isCorrect ? '✅ 정답입니다!' : '❌ 오답입니다';
  document.getElementById('fbBody').innerHTML = `<strong>정답: </strong>${['①','②','③','④'][ans]} ${allQ[curIdx]?.choices[ans] ?? ''}<br><br><strong>해설: </strong>${exp}`;
  document.getElementById('btnNext').className = 'btn-next show';
}

function nextQ() {
  curIdx++;
  if(curIdx >= allQ.length) { finishExam(); return; }
  renderQ();
}

// ══════════════════════════════════════════
//  FINISH
// ══════════════════════════════════════════
function finishExam() {
  clearInterval(timerInterval);

  // 과목별 점수 계산
  const subjScore = {1:{correct:0,total:0},2:{correct:0,total:0},3:{correct:0,total:0},4:{correct:0,total:0}};
  allQ.forEach((q,i) => {
    const s = q.subj;
    subjScore[s].total++;
    if(answered[i]?.correct) subjScore[s].correct++;
  });

  let totalCorrect = 0, totalQ = allQ.length;
  Object.values(subjScore).forEach(v => totalCorrect += v.correct);
  const totalPct = Math.round(totalCorrect/totalQ*100) || 0;
  document.getElementById('totalScore').textContent = totalPct + '점';

  const grid = document.getElementById('subjResultGrid');
  grid.innerHTML = '';
  let allPass = true;
  selectedSubjects.forEach(n => {
    const s = subjScore[n];
    if(s.total === 0) return;
    const pct = Math.round(s.correct/s.total*100);
    const pass = pct >= 40;
    if(!pass) allPass = false;
    const div = document.createElement('div');
    div.className = 'subj-result-item';
    div.innerHTML = `<div class="subj-name">${SUBJ_NAMES[n]}</div><div class="subj-score ${pass?'pass':'fail'}">${pct}점 (${s.correct}/${s.total})</div><div style="font-size:.78rem;margin-top:.2rem">${pass?'✅ 과락 없음':'❌ 과락'}</div>`;
    grid.appendChild(div);
  });

  const finalPass = allPass && totalPct >= 60;
  const msg = document.getElementById('resultMsg');
  msg.className = 'result-msg ' + (finalPass?'pass':'fail');
  msg.textContent = finalPass ? '🎉 합격 기준을 충족했습니다!' : '📚 아직 조금 더 공부가 필요해요. 오답 해설을 확인하세요!';

  showScreen('result');
}

// ══════════════════════════════════════════
//  REVIEW
// ══════════════════════════════════════════
function showReview() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  const markers = ['①','②','③','④'];
  allQ.forEach((q,i) => {
    const a = answered[i];
    if(!a) return;
    const div = document.createElement('div');
    div.className = 'review-item ' + (a.correct?'r-correct':'r-wrong');
    let choicesHtml = '';
    q.choices.forEach((c,ci) => {
      let cls = '';
      if(ci === q.ans) cls = 'rc-correct';
      else if(ci === a.selected && !a.correct) cls = 'rc-wrong-sel';
      choicesHtml += `<div class="review-choice ${cls}">${markers[ci]} ${c}${ci===q.ans?' ✅':''}${ci===a.selected&&!a.correct?' ❌':''}</div>`;
    });
    div.innerHTML = `
      <div class="review-q">[${SUBJ_NAMES[q.subj]}] ${q.q}</div>
      <div class="review-choices">${choicesHtml}</div>
      <div class="review-exp"><strong>💡 해설:</strong> ${q.exp}</div>`;
    list.appendChild(div);
  });
  showScreen('review');
}

function showResult() { showScreen('result'); }
function goHome() { clearInterval(timerInterval); showScreen('home'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
</script>
